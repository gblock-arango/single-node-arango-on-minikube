apiVersion: "database.arangodb.com/v1"
kind: "ArangoDeployment"
metadata:
  name: "single-server"
spec:
  mode: Single
  # Pin to the operator's supported line; :latest can pull a newer Arango and break inits (Init:Error after Init:1/3).
  image: arangodb/arangodb:3.12.4

  auth:
    jwtSecretName: single-server-jwt

  bootstrap:
    passwordSecretNames:
      root: arango-root-pwd

  single:
    # arangodb/arangodb runs as uid 1000; without fsGroup, Local volumes created as root (e.g. sudo mkdir repair)
    # leave /data unreadable and version-check fails on ENGINE with Permission denied.
    securityContext:
      fsGroup: 1000

    volumeClaimTemplate:
      spec:
        storageClassName: arango-minikube-data
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi

    volumes:
      - name: import-dir
        hostPath:
          path: /mnt/arango-import
          type: DirectoryOrCreate

    volumeMounts:
      - name: import-dir
        mountPath: /imports